name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (no torch/ML — unit tests only)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Unit tests + secret scan (no API key required)
        # Other test files (test_phase0-2, test_crosslingual_*, test_e2e_*, test_writer_*)
        # require OPENAI_API_KEY + ingested documents — run locally with: pytest tests/ -v
        run: python -m pytest tests/test_unit.py tests/test_integration.py tests/test_phase3.py -v
